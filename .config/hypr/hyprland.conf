#

# autogenerated = 1 # remove this line to remove the warning

# See https://wiki.hyprland.org/Configuring/Monitors/
#monitor=eDP-1,1920x1080@60,0x0,1

monitor=DP-1,2560x1440@240,0x0,1.0, bitdepth, 10
#monitor=DP-2,2560x1440@120,-2560x0,1.0, bitdepth, 8
#monitor=HDMI-A-1,1920x1080@120,2560x0,1.0, bitdepth, 10
# See https://wiki.hyprland.org/Configuring/Keywords/ for more

#workspace = 1, monitor:DP-2, persistent:true
#workspace = 2, monitor:HDMI-A-1, persistent:true
#workspace = 2, monitor:DP-2, persistent:true

# Execute your favorite apps at launch
# exec-once = waybar & hyprpaper & firefox
exec-once = waybar
exec-once = hyprpaper
exec-once = wl-clipboard-history
exec-once = wl-paste --watch cliphist store
exec-once = rm "$HOME/.cache/cliphist/db" #it'll delete history on restart
exec-once = /home/snek/scripts/swayosd.sh
exec-once = swayosd-client
# Source a file (multi-file configs
# 
# source = ~/.config/hypr/myColors.conf

# Some default env vars.
env = XCURSOR_SIZE,24

# For all categories, see https://wiki.hyprland.org/Configuring/Variables/
input {
    kb_layout = us
    kb_variant = intl
    kb_model =
    kb_options =
    kb_rules =
    accel_profile = flat
    force_no_accel = true	
    follow_mouse = 1

    touchpad {
        natural_scroll = no
    }

    sensitivity = -0.2 # -1.0 - 1.0, 0 means no modification.
}

general {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more

    gaps_in = 5
    gaps_out = 10
    border_size = 0
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)

    layout = dwindle
}

decoration {
    	# See https://wiki.hyprland.org/Configuring/Variables/ for more

	rounding = 5

    	blur{ 
    		enabled = true
    		size = 12	
		passes = 1 
    		new_optimizations = true
		popups=true

	}
	
    	inactive_opacity = 0.75
    	active_opacity = 0.9
    #	drop_shadow = true
    #	shadow_range = 4
    #	shadow_render_power = 3
    #	col.shadow = rgba(1a1a1aee)
}


# ----------------------------------------------------- 
# ▄▀█ █▄░█ █ █▀▄▀█ ▄▀█ ▀█▀ █ █▀█ █▄░█
# █▀█ █░▀█ █ █░▀░█ █▀█ ░█░ █ █▄█ █░▀█
#
# name "Fast"
# credit https://github.com/mylinuxforwork/dotfiles
# ----------------------------------------------------- 
animations {
    enabled = true
    bezier = linear, 0, 0, 1, 1
    bezier = md3_standard, 0.2, 0, 0, 1
    bezier = md3_decel, 0.05, 0.7, 0.1, 1
    bezier = md3_accel, 0.3, 0, 0.8, 0.15
    bezier = overshot, 0.05, 0.9, 0.1, 1.1
    bezier = crazyshot, 0.1, 1.5, 0.76, 0.92 
    bezier = hyprnostretch, 0.05, 0.9, 0.1, 1.0
    bezier = fluent_decel, 0.1, 1, 0, 1
    bezier = easeInOutCirc, 0.85, 0, 0.15, 1
    bezier = easeOutCirc, 0, 0.55, 0.45, 1
    bezier = easeOutExpo, 0.16, 1, 0.3, 1
    animation = windows, 1, 3, md3_decel, popin 60%
    animation = border, 1, 10, default
    animation = fade, 1, 2.5, md3_decel
    animation = workspaces, 1, 3.5, easeOutExpo, slide
    animation = specialWorkspace, 1, 3, md3_decel, slidevert
}

dwindle {
    # See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
    pseudotile = yes # aster switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = yes # you probably want this
}

master {
    # See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
   # new_is_master = true
}


# Example per-device config
# See https://wiki.hyprland.org/Configuring/Keywords/#executing for more
# device:epic-mouse-v1 {
#    sensitivity = -0.5
#}
#DISCORD FUCKING XWAYLANDVIDEOBRIDGE FUCK DISCORD
windowrule {
  name = windowrule-1
  opacity = 0.0 override
  no_anim = on
  no_initial_focus = on
  max_size = 1 1
  no_blur = on
  match:class = ^(xwaylandvideobridge)$
}

windowrule {
	name = floating
	opacity = 1
	no_anim = true
	match:float = on
	match:class = negative:wofi
	no_blur = on
	center = off
	opaque = on
}

layerrule {
  name = layerrule-1
  blur = on
  match:namespace = ^(waybar)$
}


# Example windowrule v1
# windowrule = float, ^(kitty)$
# Example windowrule v2
# windowrulev2 = float,class:^(kitty)$,title:^(kitty)$
# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more
windowrule {
  name = gbar
  opacity = 0.5 0.5
  match:class = ^(gBar)$
}

windowrule {
  name = wofi
  rounding = 20
  match:class = wofi
  pin = on
  stay_focused = on
  dim_around = on
}


# See https://wiki.hyprland.org/Configuring/Keywords/ for more
$mainMod = SUPER
$menu = wofi
$fm = nemo
$terminal = alacritty
# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
bind = $mainMod, Q, exec, alacritty
bind = $mainMod, C, killactive, 
bind = $mainMod, M, exit, 
bind = $mainMod, E, exec, dolphin
bind = $mainMod, V, togglefloating 
#bind = $mainMod, D, exec, wofi --show drun
#bind = $mainMod, D, exec, tofi-run -c ~/.config/tofi/fullscreen --terminal kitty | xargs hyprctl dispatch exec
bind = $mainMod, SPACE, exec, $menu
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, J, togglesplit, # dwindle
bind = $mainMod, F, fullscreen, #fullscreen



# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

#CUSTO
bind = $mainMod, SPACE , exec, cliphist list | wofi --show drun -H 600 -W 900 | cliphist decode | wl-copy
windowrule {
  name = windowrule-4
  opacity = 1.0 1.0 override
  match:class = firefox
}


#Audio
bindep = , XF86AudioRaiseVolume, exec, swayosd-client --monitor "$(hyprctl monitors -j | jq -r '.[] | select(.focused == true).name')" --output-volume raise
bindep = , XF86AudioLowerVolume, exec, swayosd-client --monitor "$(hyprctl monitors -j | jq -r '.[] | select(.focused == true).name')" --output-volume lower
bindep = , XF86AudioPlay, exec, playerctl play-pause
bindep = , XF86AudioNext, exec, playerctl next
bindep = , XF86AudioPrev, exec, playerctl previous
bindep = mod5, semicolon, exec, ~/.config/scripts/spot.sh - 10
bindep = mod5, dead_acute, exec, ~/.config/scripts/spot.sh + 10
bindep = ALT, O, exec, ~/.config/scripts/spot.sh + 10
bindep = Shift_R, backslash, exec, obs-cmd replay save


#Brightness
bindep = , XF86MonBrightnessDown, exec, ddcutil -d 1 setvcp 10 - 10
bindep = , XF86MonBrightnessUp, exec, ddcutil -d 1 setvcp 10 + 10


#screenshare
exec-once=dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP


bind = SUPER_SHIFT, S, exec, wl-copy < $(grimshot save area)

# --- dark mode fix ---
exec = gsettings set org.gnome.desktop.interface color-scheme "prefer-dark"   # for GTK4 apps
exec = gsettings set org.gnome.desktop.interface gtk-theme "adw-gtk3-dark"   # for GTK3 apps
# --- end of dark theme fix ---

#Setting GPU
env = AQ_DRM_DEVICES,/dev/dri/card1:/dev/dri/card0

# stuff
exec-once = swayosd-server
exec = nwg-look -a

